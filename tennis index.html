<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAKKYŪ — Table Tennis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Dots&family=DotGothic16&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #f5f0e8;
  --amber: #e8a020;
  --red: #c8281e;
  --darkred: #8c1a12;
  --teal: #1a7a6e;
  --darkteal: #0f5248;
  --dark: #1a1510;
  --mid: #2e2820;
  --text: #1a1510;
  --wood1: #8b5e3c;
  --wood2: #6b4428;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--dark);
  font-family: 'DotGothic16', monospace;
  color: var(--cream);
  user-select: none;
}

/* ── WOOD PANEL BACKGROUND ── */
body {
  background:
    repeating-linear-gradient(
      92deg,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px
    ),
    repeating-linear-gradient(
      180deg,
      transparent 0px, transparent 8px,
      rgba(255,255,255,0.015) 8px, rgba(255,255,255,0.015) 9px
    ),
    linear-gradient(160deg, #2a1f14 0%, #1a1510 40%, #221a0f 70%, #1a1510 100%);
}

/* ── SCANLINES ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent 0px, transparent 3px,
    rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
  );
  pointer-events: none;
  z-index: 9000;
}

/* ── CORNER DECORATION ── */
body::after {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 60% at 0% 0%, rgba(200,120,40,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 60% at 100% 100%, rgba(200,40,30,0.08) 0%, transparent 60%);
  pointer-events: none;
  z-index: 1;
}

#app {
  width: 100vw; height: 100vh;
  display: flex; align-items: center; justify-content: center;
  position: relative; z-index: 2;
}

/* ══════════════════════════════════════════════
   SCREENS
══════════════════════════════════════════════ */
.screen {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.3s ease;
}
.screen.hidden { opacity: 0; pointer-events: none; }

/* ══════════════════════════════════════════════
   START SCREEN
══════════════════════════════════════════════ */
#s-start {
  gap: 0;
}

.cabinet-frame {
  background:
    linear-gradient(180deg, #3d2d1a 0%, #2e2118 100%);
  border: 3px solid #8b5e3c;
  border-radius: 16px;
  padding: 32px 40px 28px;
  width: min(520px, 94vw);
  box-shadow:
    0 0 0 1px #4a3020,
    0 0 0 5px #2a1e12,
    0 0 0 6px #8b5e3c,
    0 8px 40px rgba(0,0,0,0.7),
    inset 0 1px 0 rgba(255,255,255,0.08);
  position: relative;
  overflow: hidden;
}

/* Cabinet wood grain lines */
.cabinet-frame::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    175deg,
    transparent 0%, transparent 12%,
    rgba(0,0,0,0.03) 12%, rgba(0,0,0,0.03) 13%
  );
  border-radius: 14px;
}

/* Screen inset */
.cabinet-screen {
  background: #0d1a0f;
  border: 2px solid #1a3020;
  border-radius: 8px;
  padding: 20px 24px 16px;
  margin-bottom: 24px;
  box-shadow:
    inset 0 0 30px rgba(0,0,0,0.8),
    inset 0 0 60px rgba(0,80,40,0.2),
    0 0 0 1px #0a1a0e;
  position: relative;
}

/* CRT green-ish glow on screen */
.cabinet-screen::after {
  content: '';
  position: absolute; inset: 0;
  border-radius: 6px;
  background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(0,255,100,0.04) 0%, transparent 70%);
  pointer-events: none;
}

.logo-eyebrow {
  font-family: 'DotGothic16', monospace;
  font-size: 10px;
  letter-spacing: 6px;
  color: rgba(100,200,130,0.6);
  text-align: center;
  margin-bottom: 6px;
}

.logo-main {
  font-family: 'Zen Dots', monospace;
  font-size: clamp(36px, 6vw, 60px);
  font-weight: 400;
  text-align: center;
  line-height: 1;
  color: #a8e878;
  text-shadow:
    0 0 10px rgba(100,230,80,0.8),
    0 0 30px rgba(60,180,50,0.4),
    0 0 60px rgba(40,140,40,0.2);
  letter-spacing: 4px;
  animation: crt-pulse 3s ease-in-out infinite;
}

.logo-kanji {
  font-size: 11px;
  letter-spacing: 8px;
  color: rgba(100,200,130,0.4);
  text-align: center;
  margin-top: 6px;
}

/* Preview SVG table */
#preview-table {
  display: block;
  margin: 14px auto 0;
}

/* Config controls */
.controls-strip {
  display: flex;
  flex-direction: column;
  gap: 12px;
  position: relative;
  z-index: 1;
}

.cfg-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.cfg-label {
  font-size: 10px;
  letter-spacing: 3px;
  color: rgba(200,160,80,0.7);
  min-width: 76px;
  text-transform: uppercase;
}

/* Pill buttons */
.pill-row {
  display: flex;
  gap: 4px;
  flex: 1;
}

.pill {
  flex: 1;
  padding: 7px 4px;
  font-family: 'DotGothic16', monospace;
  font-size: 11px;
  background: rgba(0,0,0,0.4);
  color: rgba(200,180,140,0.5);
  border: 1px solid rgba(139,94,60,0.3);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.12s;
  text-align: center;
}
.pill:hover { color: var(--amber); border-color: var(--amber); }
.pill.active {
  background: var(--amber);
  color: var(--dark);
  border-color: var(--amber);
  box-shadow: 0 0 10px rgba(232,160,32,0.5);
}

/* Difficulty buttons */
.diff-row { display: flex; gap: 5px; flex: 1; }
.diff-btn {
  flex: 1;
  padding: 7px 4px;
  font-family: 'Zen Dots', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  background: rgba(0,0,0,0.4);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.12s;
  text-align: center;
  border: 1px solid transparent;
}
.diff-btn[data-d="easy"] { color: rgba(100,220,80,0.5); border-color: rgba(100,220,80,0.15); }
.diff-btn[data-d="easy"]:hover { color: #64dc50; border-color: rgba(100,220,80,0.5); }
.diff-btn[data-d="easy"].active { background: #64dc50; color: #0a1a08; border-color: #64dc50; box-shadow: 0 0 12px rgba(100,220,80,0.5); }

.diff-btn[data-d="medium"] { color: rgba(232,160,32,0.5); border-color: rgba(232,160,32,0.15); }
.diff-btn[data-d="medium"]:hover { color: var(--amber); border-color: rgba(232,160,32,0.5); }
.diff-btn[data-d="medium"].active { background: var(--amber); color: var(--dark); border-color: var(--amber); box-shadow: 0 0 12px rgba(232,160,32,0.5); }

.diff-btn[data-d="hard"] { color: rgba(200,40,30,0.5); border-color: rgba(200,40,30,0.15); }
.diff-btn[data-d="hard"]:hover { color: var(--red); border-color: rgba(200,40,30,0.5); }
.diff-btn[data-d="hard"].active { background: var(--red); color: var(--cream); border-color: var(--red); box-shadow: 0 0 12px rgba(200,40,30,0.5); }

/* Custom input row */
#custom-row { display: none; }
#custom-row.show { display: flex; }
#custom-inp {
  width: 80px;
  padding: 6px 10px;
  font-family: 'DotGothic16', monospace;
  font-size: 13px;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(232,160,32,0.4);
  border-radius: 4px;
  color: var(--amber);
  text-align: center;
  outline: none;
}
#custom-inp:focus { border-color: var(--amber); box-shadow: 0 0 8px rgba(232,160,32,0.3); }

.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(139,94,60,0.4), transparent);
  margin: 2px 0;
}

/* Serve button */
#serve-btn {
  width: 100%;
  padding: 14px;
  font-family: 'Zen Dots', monospace;
  font-size: 16px;
  letter-spacing: 5px;
  background: linear-gradient(180deg, #c8281e 0%, #8c1a12 100%);
  color: var(--cream);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  position: relative;
  box-shadow:
    0 4px 0 #5a0e08,
    0 6px 15px rgba(200,40,30,0.4),
    inset 0 1px 0 rgba(255,255,255,0.15);
  transition: transform 0.1s, box-shadow 0.1s;
  text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  margin-top: 4px;
}
#serve-btn:hover {
  background: linear-gradient(180deg, #e0301e 0%, #a01e14 100%);
  box-shadow: 0 4px 0 #5a0e08, 0 8px 25px rgba(200,40,30,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
}
#serve-btn:active {
  transform: translateY(3px);
  box-shadow: 0 1px 0 #5a0e08, 0 3px 8px rgba(200,40,30,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
}

.hint-text {
  font-size: 9px;
  letter-spacing: 2px;
  color: rgba(200,160,80,0.35);
  text-align: center;
  margin-top: 10px;
}

/* Cabinet bolts */
.bolt {
  position: absolute;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #b08060, #6b4428);
  border: 1px solid #4a2e18;
  box-shadow: 0 1px 2px rgba(0,0,0,0.6);
}
.bolt-tl { top: 10px; left: 12px; }
.bolt-tr { top: 10px; right: 12px; }
.bolt-bl { bottom: 10px; left: 12px; }
.bolt-br { bottom: 10px; right: 12px; }

/* ══════════════════════════════════════════════
   GAME SCREEN
══════════════════════════════════════════════ */
#s-game {
  flex-direction: column;
  gap: 0;
  background: transparent;
}

#hud {
  width: min(900px, 98vw);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 24px 6px;
  position: relative;
  z-index: 5;
}

.hud-player { display: flex; flex-direction: column; gap: 1px; }
.hud-player.right { align-items: flex-end; }

.hud-name {
  font-size: 9px;
  letter-spacing: 4px;
  color: rgba(200,160,80,0.5);
  text-transform: uppercase;
}

.hud-score {
  font-family: 'Zen Dots', monospace;
  font-size: 54px;
  line-height: 1;
  font-weight: 400;
  transition: transform 0.1s, filter 0.15s;
}
#hs1 { color: #4ae8b8; text-shadow: 0 0 16px rgba(74,232,184,0.7), 0 0 40px rgba(74,232,184,0.3); }
#hs2 { color: #e84a4a; text-shadow: 0 0 16px rgba(232,74,74,0.7), 0 0 40px rgba(232,74,74,0.3); }
.hud-score.pop { transform: scale(1.45); filter: brightness(2); }

.hud-center {
  display: flex; flex-direction: column;
  align-items: center; gap: 3px;
}

.hud-title {
  font-family: 'Zen Dots', monospace;
  font-size: 13px;
  letter-spacing: 5px;
  color: rgba(200,160,80,0.8);
  text-shadow: 0 0 10px rgba(200,140,40,0.3);
}
.hud-sub { font-size: 9px; letter-spacing: 3px; color: rgba(200,160,80,0.35); }

#diff-badge {
  font-size: 8px;
  letter-spacing: 3px;
  padding: 2px 10px;
  border-radius: 20px;
  border: 1px solid;
}
#diff-badge.easy   { color: #64dc50; border-color: rgba(100,220,80,0.35); }
#diff-badge.medium { color: var(--amber); border-color: rgba(232,160,32,0.35); }
#diff-badge.hard   { color: #e84a4a; border-color: rgba(232,74,74,0.35); }

/* Canvas */
#cwrap {
  position: relative;
  width: min(900px, 98vw);
}
#gc {
  display: block; width: 100%;
  border-radius: 4px;
  border: 2px solid rgba(139,94,60,0.4);
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.6),
    0 0 40px rgba(0,0,0,0.5),
    inset 0 0 20px rgba(0,0,0,0.3);
  cursor: none;
}

/* ── Overlays ── */
.ov {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border-radius: 4px;
  gap: 14px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
  z-index: 30;
}
.ov.show { opacity: 1; pointer-events: all; }

/* Point overlay */
#ov-point {
  background: rgba(15,12,8,0.6);
  backdrop-filter: blur(3px);
}
.ov-point-big {
  font-family: 'Zen Dots', monospace;
  font-size: clamp(24px, 4.5vw, 50px);
  letter-spacing: 4px;
  font-weight: 400;
  animation: stamp 0.25s cubic-bezier(0.2, 1.5, 0.5, 1) both;
}
.ov-point-small {
  font-size: 12px;
  letter-spacing: 4px;
  color: rgba(200,180,140,0.5);
}

/* Pause overlay */
#ov-pause {
  background: rgba(15,12,8,0.75);
  backdrop-filter: blur(5px);
}
.pause-title {
  font-family: 'Zen Dots', monospace;
  font-size: 44px;
  letter-spacing: 8px;
  color: var(--amber);
  text-shadow: 0 0 20px rgba(232,160,32,0.7);
  animation: crt-pulse 2s ease-in-out infinite;
}
.pause-sub { font-size: 10px; letter-spacing: 3px; color: rgba(200,160,80,0.4); }

/* Game over overlay */
#ov-over {
  background: rgba(10,8,5,0.9);
  backdrop-filter: blur(8px);
}
.over-title {
  font-family: 'Zen Dots', monospace;
  font-size: clamp(28px, 5.5vw, 60px);
  letter-spacing: 5px;
  font-weight: 400;
  animation: stamp 0.35s cubic-bezier(0.2, 1.5, 0.5, 1) both;
}
#over-score {
  font-size: 14px;
  letter-spacing: 5px;
  color: rgba(200,180,140,0.45);
}

.ov-buttons { display: flex; gap: 12px; margin-top: 4px; }
.ov-btn {
  padding: 11px 28px;
  font-family: 'DotGothic16', monospace;
  font-size: 11px;
  letter-spacing: 3px;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.12s;
}
#btn-rematch {
  background: linear-gradient(180deg, #c8281e, #8c1a12);
  color: var(--cream);
  border: none;
  box-shadow: 0 3px 0 #5a0e08, 0 5px 15px rgba(200,40,30,0.4);
}
#btn-rematch:hover { background: linear-gradient(180deg, #e0301e, #a01e14); }
#btn-rematch:active { transform: translateY(2px); box-shadow: 0 1px 0 #5a0e08; }
#btn-menu {
  background: transparent;
  color: rgba(200,180,140,0.45);
  border: 1px solid rgba(139,94,60,0.3);
}
#btn-menu:hover { color: var(--amber); border-color: rgba(232,160,32,0.5); }

/* Rally label */
#rally-lbl {
  position: absolute;
  top: 8px; left: 50%; transform: translateX(-50%);
  font-family: 'Zen Dots', monospace;
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--amber);
  text-shadow: 0 0 12px rgba(232,160,32,0.8);
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 20;
}

/* ── ANIMATIONS ── */
@keyframes crt-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.82; }
}
@keyframes stamp {
  from { transform: scale(1.6); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
@keyframes flicker {
  0%, 93%, 100% { opacity: 1; }
  95% { opacity: 0.2; }
  97% { opacity: 0.7; }
}
</style>
</head>
<body>
<div id="app">

<!-- ══════════════════════════════════════════
     START SCREEN
══════════════════════════════════════════ -->
<div class="screen" id="s-start">
  <div class="cabinet-frame">
    <div class="bolt bolt-tl"></div>
    <div class="bolt bolt-tr"></div>
    <div class="bolt bolt-bl"></div>
    <div class="bolt bolt-br"></div>

    <div class="cabinet-screen">
      <div class="logo-eyebrow">1984 ARCADE EDITION</div>
      <div class="logo-main" style="animation:flicker 6s infinite">TAKKYŪ</div>
      <div class="logo-kanji">卓球 · TABLE TENNIS</div>

      <!-- SVG preview illustration -->
      <svg id="preview-table" width="320" height="88" viewBox="0 0 320 88" fill="none">
        <!-- arena bg -->
        <rect width="320" height="88" fill="#060e08"/>
        <!-- crowd silhouette back -->
        <path d="M0 70 Q8 58 16 65 Q24 54 32 62 Q40 50 48 60 Q56 48 64 58 Q72 47 80 57 Q88 47 96 56 Q104 46 112 55 Q120 46 128 55 Q136 46 144 54 Q152 46 160 54 Q168 46 176 54 Q184 46 192 55 Q200 46 208 56 Q216 47 224 57 Q232 48 240 58 Q248 50 256 60 Q264 52 272 62 Q280 55 288 64 Q296 58 304 65 Q312 59 320 66 L320 88 L0 88Z" fill="#0c1810"/>
        <!-- spotlight beams -->
        <path d="M80 0 L50 60 L110 60Z" fill="rgba(100,200,80,0.04)"/>
        <path d="M160 0 L130 60 L190 60Z" fill="rgba(100,200,80,0.04)"/>
        <path d="M240 0 L210 60 L270 60Z" fill="rgba(100,200,80,0.04)"/>
        <!-- table surface -->
        <rect x="20" y="50" width="280" height="30" rx="2" fill="#0a2a1e" stroke="rgba(74,232,184,0.2)" stroke-width="1"/>
        <!-- table top glow -->
        <rect x="20" y="50" width="280" height="4" fill="rgba(74,232,184,0.08)"/>
        <!-- center line dashed -->
        <line x1="160" y1="50" x2="160" y2="80" stroke="rgba(74,232,184,0.15)" stroke-width="1.5" stroke-dasharray="4 4"/>
        <!-- net post -->
        <rect x="157" y="42" width="6" height="38" rx="1" fill="#111d13"/>
        <!-- net bars -->
        <line x1="157" y1="42" x2="163" y2="42" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
        <line x1="157" y1="80" x2="163" y2="80" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
        <line x1="160" y1="44" x2="160" y2="78" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
        <line x1="157" y1="50" x2="163" y2="50" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
        <line x1="157" y1="57" x2="163" y2="57" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
        <line x1="157" y1="64" x2="163" y2="64" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
        <line x1="157" y1="71" x2="163" y2="71" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
        <!-- P1 paddle -->
        <rect x="26" y="54" width="9" height="22" rx="3" fill="#4ae8b8"/>
        <rect x="28" y="57" width="3" height="16" rx="1" fill="rgba(255,255,255,0.3)"/>
        <!-- P2 paddle -->
        <rect x="285" y="54" width="9" height="22" rx="3" fill="#e84a4a"/>
        <rect x="287" y="57" width="3" height="16" rx="1" fill="rgba(255,255,255,0.3)"/>
        <!-- ball + trail -->
        <circle cx="120" cy="64" r="2.5" fill="rgba(255,255,255,0.2)"/>
        <circle cx="134" cy="62" r="3.5" fill="rgba(255,255,255,0.4)"/>
        <circle cx="148" cy="61" r="5" fill="white"/>
        <circle cx="146" cy="59" r="1.8" fill="rgba(255,255,255,0.6)"/>
        <!-- table legs -->
        <rect x="42" y="80" width="5" height="7" fill="#071810"/>
        <rect x="273" y="80" width="5" height="7" fill="#071810"/>
      </svg>
    </div>

    <div class="controls-strip">
      <!-- Difficulty -->
      <div class="cfg-row">
        <span class="cfg-label">LEVEL</span>
        <div class="diff-row">
          <button class="diff-btn active" data-d="easy"   onclick="setDiff('easy')">EASY</button>
          <button class="diff-btn"        data-d="medium" onclick="setDiff('medium')">MEDIUM</button>
          <button class="diff-btn"        data-d="hard"   onclick="setDiff('hard')">HARD</button>
        </div>
      </div>

      <!-- Score target -->
      <div class="cfg-row">
        <span class="cfg-label">POINTS</span>
        <div class="pill-row">
          <button class="pill active" data-s="5"  onclick="setPts(5, this)">5</button>
          <button class="pill"        data-s="7"  onclick="setPts(7, this)">7</button>
          <button class="pill"        data-s="11" onclick="setPts(11, this)">11</button>
          <button class="pill"        data-s="21" onclick="setPts(21, this)">21</button>
          <button class="pill"        data-s="0"  onclick="setPts(0, this)">✏</button>
        </div>
      </div>

      <div class="cfg-row" id="custom-row">
        <span class="cfg-label">CUSTOM</span>
        <input id="custom-inp" type="number" min="2" max="99" value="15"
               oninput="CFG.target=Math.max(2,Math.min(99,parseInt(this.value)||5))">
      </div>

      <div class="divider"></div>

      <button id="serve-btn" onclick="startGame()">▶ &nbsp; INSERT COIN</button>

      <div class="hint-text">↑ ↓ MOVE &nbsp;·&nbsp; SPACE PAUSE &nbsp;·&nbsp; ESC MENU</div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     GAME SCREEN
══════════════════════════════════════════ -->
<div class="screen hidden" id="s-game">
  <div id="hud">
    <div class="hud-player left">
      <div class="hud-name">PLAYER</div>
      <div class="hud-score" id="hs1">0</div>
    </div>
    <div class="hud-center">
      <div class="hud-title">TAKKYŪ</div>
      <div class="hud-sub" id="hud-target">FIRST TO 5</div>
      <div id="diff-badge" class="easy">EASY</div>
    </div>
    <div class="hud-player right">
      <div class="hud-name">CPU</div>
      <div class="hud-score" id="hs2">0</div>
    </div>
  </div>

  <div id="cwrap">
    <canvas id="gc"></canvas>
    <div id="rally-lbl"></div>

    <!-- Point scored -->
    <div class="ov" id="ov-point">
      <div class="ov-point-big" id="pt-big"></div>
      <div class="ov-point-small" id="pt-small"></div>
    </div>

    <!-- Pause -->
    <div class="ov" id="ov-pause">
      <div class="pause-title">PAUSE</div>
      <div class="pause-sub">PRESS SPACE TO CONTINUE</div>
    </div>

    <!-- Game over -->
    <div class="ov" id="ov-over">
      <div class="over-title" id="over-title"></div>
      <div id="over-score"></div>
      <div class="ov-buttons">
        <button class="ov-btn" id="btn-rematch" onclick="rematch()">⟳ REMATCH</button>
        <button class="ov-btn" id="btn-menu"    onclick="goMenu()">MENU</button>
      </div>
    </div>
  </div>
</div>

</div><!-- #app -->

<script>
/* ═══════════════════════════════════════════════════════════
   CONFIG STATE
═══════════════════════════════════════════════════════════ */
const CFG = { diff: 'easy', target: 5 };

function setDiff(d) {
  CFG.diff = d;
  document.querySelectorAll('.diff-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.d === d));
}

function setPts(v, btn) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  const cr = document.getElementById('custom-row');
  if (v === 0) {
    cr.classList.add('show');
    CFG.target = parseInt(document.getElementById('custom-inp').value) || 15;
  } else {
    cr.classList.remove('show');
    CFG.target = v;
  }
}

/* ═══════════════════════════════════════════════════════════
   CANVAS SETUP
═══════════════════════════════════════════════════════════ */
const GC  = document.getElementById('gc');
const ctx = GC.getContext('2d');
const CW  = 900;
const CH  = 500;
GC.width  = CW;
GC.height = CH;

/* ═══════════════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════════════ */
const PW = 14;   // paddle width
const PH = 88;   // paddle height
const PM = 32;   // paddle margin from edge
const BR = 8;    // ball radius

/* ═══════════════════════════════════════════════════════════
   AI PROFILES  — each level behaves differently
═══════════════════════════════════════════════════════════ */
const PROFILES = {
  easy: {
    // Slow reaction, large positional error, randomly misses
    maxSpeed:   3.5,
    errPx:      55,       // random offset from ideal target
    predict:    0.30,     // how much trajectory simulation to use (0–1)
    framePause: 22,       // decision cooldown (higher = slower to react)
    missChance: 0.06,     // probability of intentional miss per decision
    returnBias: 0.55,     // partial centre-return when ball going away
  },
  medium: {
    maxSpeed:   5.8,
    errPx:      20,
    predict:    0.72,
    framePause: 8,
    missChance: 0.012,
    returnBias: 0.75,
  },
  hard: {
    maxSpeed:   8.5,
    errPx:      5,
    predict:    0.97,
    framePause: 2,
    missChance: 0.0,
    returnBias: 1.0,
  },
};

/* ═══════════════════════════════════════════════════════════
   GAME STATE
═══════════════════════════════════════════════════════════ */
let G   = {};
let RAF = null;
let paused = false;
let phase  = 'menu'; // menu | playing | point | over

function initGame() {
  G = {
    p1:  { y: CH / 2 - PH / 2, score: 0 },
    p2:  { y: CH / 2 - PH / 2, score: 0 },
    ball:{ x: CW/2, y: CH/2, vx: 0, vy: 0, spin: 0, active: false },
    trail:   [],
    parts:   [],
    bg:      buildStaticBG(),
    profile: PROFILES[CFG.diff],
    // CPU internals
    cpuTimer:  0,
    cpuTarget: CH / 2 - PH / 2,
    // Rally
    rally: 0,
  };
}

/* ═══════════════════════════════════════════════════════════
   STATIC BACKGROUND (pre-rendered to offscreen canvas)
═══════════════════════════════════════════════════════════ */
function buildStaticBG() {
  const bc = document.createElement('canvas');
  bc.width = CW; bc.height = CH;
  const bx = bc.getContext('2d');

  // Sky
  const sky = bx.createLinearGradient(0, 0, 0, CH);
  sky.addColorStop(0,   '#04080a');
  sky.addColorStop(0.5, '#060e0a');
  sky.addColorStop(1,   '#081408');
  bx.fillStyle = sky;
  bx.fillRect(0, 0, CW, CH);

  // Crowd silhouette — two depth layers
  function drawCrowd(yBase, fillCol, freq1, freq2, freq3, amp1, amp2, amp3) {
    bx.fillStyle = fillCol;
    bx.beginPath();
    bx.moveTo(0, CH);
    for (let i = 0; i <= 120; i++) {
      const fx = i / 120;
      const h = Math.abs(
        Math.sin(fx * Math.PI * freq1) * amp1 +
        Math.sin(fx * Math.PI * freq2 + 1.2) * amp2 +
        Math.sin(fx * Math.PI * freq3 + 2.5) * amp3
      );
      bx.lineTo(fx * CW, CH * yBase - h);
    }
    bx.lineTo(CW, CH);
    bx.closePath();
    bx.fill();
  }
  drawCrowd(0.52, '#0c1c10', 19, 34, 8,  7, 4, 10);
  drawCrowd(0.64, '#081408', 23, 14, 41, 5, 9, 4);

  // Spotlights
  [CW*0.18, CW*0.5, CW*0.82].forEach(sx => {
    const sg = bx.createRadialGradient(sx, 0, 0, sx, CH * 0.5, CW * 0.22);
    sg.addColorStop(0, 'rgba(100,220,80,0.08)');
    sg.addColorStop(1, 'rgba(0,0,0,0)');
    bx.fillStyle = sg;
    bx.beginPath();
    bx.moveTo(sx, 0);
    bx.lineTo(sx - 100, CH * 0.6);
    bx.lineTo(sx + 100, CH * 0.6);
    bx.closePath();
    bx.fill();
  });

  // Table surface
  const tY = Math.floor(CH * 0.40);
  const tH = CH - tY;

  const tg = bx.createLinearGradient(0, tY, 0, CH);
  tg.addColorStop(0,    '#0c3022');
  tg.addColorStop(0.35, '#103c28');
  tg.addColorStop(1,    '#081e14');
  bx.fillStyle = tg;
  bx.beginPath();
  bx.roundRect(0, tY, CW, tH + 2, [6, 6, 0, 0]);
  bx.fill();

  // Table top edge glow
  const eg = bx.createLinearGradient(0, tY, 0, tY + 10);
  eg.addColorStop(0, 'rgba(74,232,184,0.25)');
  eg.addColorStop(1, 'rgba(74,232,184,0)');
  bx.fillStyle = eg;
  bx.fillRect(0, tY, CW, 10);

  // Table border
  bx.strokeStyle = 'rgba(74,232,184,0.2)';
  bx.lineWidth   = 2;
  bx.beginPath();
  bx.roundRect(1, tY, CW - 2, tH, [6, 6, 0, 0]);
  bx.stroke();

  // Center dashed line
  bx.save();
  bx.setLineDash([10, 9]);
  bx.strokeStyle = 'rgba(74,232,184,0.12)';
  bx.lineWidth   = 1.5;
  bx.beginPath();
  bx.moveTo(CW / 2, tY);
  bx.lineTo(CW / 2, CH);
  bx.stroke();
  bx.setLineDash([]);
  bx.restore();

  // Half-court horizontal (faint)
  bx.save();
  bx.setLineDash([5, 12]);
  bx.strokeStyle = 'rgba(74,232,184,0.05)';
  bx.lineWidth   = 1;
  bx.beginPath();
  bx.moveTo(0,  (tY + CH) / 2);
  bx.lineTo(CW, (tY + CH) / 2);
  bx.stroke();
  bx.setLineDash([]);
  bx.restore();

  // Subtle watermark
  bx.font      = '11px Zen Dots, monospace';
  bx.fillStyle = 'rgba(74,232,184,0.04)';
  bx.textAlign = 'center';
  bx.fillText('TAKKYŪ 卓球', CW / 2, CH - 10);

  return bc;
}

/* ═══════════════════════════════════════════════════════════
   BALL LAUNCH
═══════════════════════════════════════════════════════════ */
function launchBall(dir) {
  const ball = G.ball;
  ball.active = true;
  ball.x  = CW / 2;
  ball.y  = CH * 0.64 + (Math.random() - 0.5) * 100;
  ball.spin = 0;
  G.trail = [];
  G.rally = 0;
  updateRallyLabel();

  const spd = 5.5;
  const ang = (Math.random() * 0.55) - 0.275;
  ball.vx = dir * spd * Math.cos(ang);
  ball.vy = spd * Math.sin(ang);
}

/* ═══════════════════════════════════════════════════════════
   INPUT
═══════════════════════════════════════════════════════════ */
const KEYS = {};
document.addEventListener('keydown', e => {
  KEYS[e.code] = true;

  if (e.code === 'Space') {
    if (phase === 'playing') {
      paused = !paused;
      document.getElementById('ov-pause').classList.toggle('show', paused);
      if (!paused) loop();
    }
    e.preventDefault();
  }

  if (e.code === 'Escape' &&
      (phase === 'playing' || phase === 'over' || phase === 'point')) {
    goMenu();
  }

  if (['ArrowUp', 'ArrowDown'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { KEYS[e.code] = false; });

/* ═══════════════════════════════════════════════════════════
   SCREEN MANAGEMENT
═══════════════════════════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function startGame() {
  initGame();

  // Update HUD
  document.getElementById('hs1').textContent = '0';
  document.getElementById('hs2').textContent = '0';
  document.getElementById('hud-target').textContent = 'FIRST TO ' + CFG.target;

  const db = document.getElementById('diff-badge');
  db.className = CFG.diff;
  db.textContent = CFG.diff.toUpperCase();

  // Hide all overlays
  ['ov-point', 'ov-pause', 'ov-over'].forEach(id =>
    document.getElementById(id).classList.remove('show'));

  showScreen('s-game');
  phase  = 'playing';
  paused = false;

  launchBall(Math.random() < 0.5 ? 1 : -1);
  if (RAF) cancelAnimationFrame(RAF);
  loop();
}

function goMenu() {
  if (RAF) cancelAnimationFrame(RAF);
  RAF   = null;
  phase = 'menu';
  paused = false;
  showScreen('s-start');
}

function rematch() {
  document.getElementById('ov-over').classList.remove('show');
  startGame();
}

/* ═══════════════════════════════════════════════════════════
   UPDATE — called every frame
═══════════════════════════════════════════════════════════ */
function update() {
  const { p1, p2, ball, profile } = G;

  /* ── Player paddle (↑ / ↓) ── */
  const PS = 8;
  if (KEYS['ArrowUp'])   p1.y = Math.max(0,       p1.y - PS);
  if (KEYS['ArrowDown']) p1.y = Math.min(CH - PH, p1.y + PS);

  /* ── CPU ── */
  updateCPU();

  if (!ball.active) return;

  /* ── Ball physics ── */
  ball.x += ball.vx;
  ball.y += ball.vy;
  ball.vy += ball.spin * 0.10;
  ball.spin *= 0.97;

  // Trail
  G.trail.unshift({ x: ball.x, y: ball.y });
  if (G.trail.length > 14) G.trail.pop();

  // Top / bottom wall
  if (ball.y - BR < 0)  { ball.y = BR;       ball.vy =  Math.abs(ball.vy); ball.spin *= -0.5; }
  if (ball.y + BR > CH) { ball.y = CH - BR;  ball.vy = -Math.abs(ball.vy); ball.spin *= -0.5; }

  /* ── Paddle P1 (left) ── */
  const p1x = PM;
  if (ball.vx < 0 &&
      ball.x - BR <= p1x + PW &&
      ball.x + BR >= p1x &&
      ball.y + BR >= p1.y &&
      ball.y - BR <= p1.y + PH) {
    deflectBall(ball, p1, 1, p1x + PW + BR);
    G.rally++;
    spawnHitParticles(ball.x, ball.y, '#4ae8b8');
    updateRallyLabel();
  }

  /* ── Paddle P2 (right) ── */
  const p2x = CW - PM - PW;
  if (ball.vx > 0 &&
      ball.x + BR >= p2x &&
      ball.x - BR <= p2x + PW &&
      ball.y + BR >= p2.y &&
      ball.y - BR <= p2.y + PH) {
    deflectBall(ball, p2, -1, p2x - BR);
    G.rally++;
    spawnHitParticles(ball.x, ball.y, '#e84a4a');
    updateRallyLabel();
  }

  /* ── Score ── */
  if (ball.x + BR < 0)   { spawnScoreParticles(CW * 0.15, CH * 0.65, '#e84a4a'); scorePoint(2); return; }
  if (ball.x - BR > CW)  { spawnScoreParticles(CW * 0.85, CH * 0.65, '#4ae8b8'); scorePoint(1); return; }

  /* ── Particles ── */
  tickParticles();
}

function deflectBall(ball, pad, dir, newX) {
  const rel = (ball.y - (pad.y + PH / 2)) / (PH / 2); // −1..1
  const ang = rel * 1.08;
  const spd = Math.min(Math.hypot(ball.vx, ball.vy) * 1.055 + 0.3, 21);
  ball.vx   = dir * Math.abs(Math.cos(ang) * spd);
  ball.vy   = Math.sin(ang) * spd;
  ball.spin = rel * 0.45;
  ball.x    = newX;
}

/* ═══════════════════════════════════════════════════════════
   CPU AI  — distinct behaviour per difficulty
═══════════════════════════════════════════════════════════ */
function updateCPU() {
  const { p2, ball, profile } = G;

  G.cpuTimer--;

  /* Move toward stored target every frame (smooth, speed-capped) */
  const center = p2.y + PH / 2;
  const delta  = G.cpuTarget - center;
  const move   = Math.max(-profile.maxSpeed, Math.min(profile.maxSpeed, delta * 0.18));
  p2.y = Math.max(0, Math.min(CH - PH, p2.y + move));

  /* Recalculate target on cooldown */
  if (G.cpuTimer > 0) return;
  G.cpuTimer = profile.framePause;

  // Intentional miss (easy mode flavour)
  if (Math.random() < profile.missChance) {
    G.cpuTarget = Math.random() < 0.5 ? -PH : CH + PH;
    return;
  }

  let targetY;
  if (ball.vx > 0 && ball.active) {
    /* Ball approaching CPU side — predict landing Y */
    const destX = CW - PM - PW;
    const time  = (destX - ball.x) / Math.max(ball.vx, 0.1);

    if (profile.predict >= 0.65) {
      /* Full simulation with spin + wall bounces */
      let sy = ball.y, svy = ball.vy, ssp = ball.spin;
      const steps = Math.floor(time);
      for (let i = 0; i < steps; i++) {
        sy  += svy;
        svy += ssp * 0.10;
        ssp *= 0.97;
        if (sy - BR < 0)  { sy = BR;       svy =  Math.abs(svy); ssp *= -0.5; }
        if (sy + BR > CH) { sy = CH - BR;  svy = -Math.abs(svy); ssp *= -0.5; }
      }
      targetY = sy;
    } else {
      /* Simple linear + basic wall-bounce for easy/medium */
      let t = ball.y + ball.vy * time;
      while (t < BR || t > CH - BR) {
        if (t < BR)       t = BR * 2 - t;
        if (t > CH - BR)  t = (CH - BR) * 2 - t;
      }
      targetY = t;
    }

    /* Blend perfect target with current ball Y based on predict level */
    targetY = ball.y + (targetY - ball.y) * profile.predict;

    /* Add positional noise */
    targetY += (Math.random() - 0.5) * 2 * profile.errPx;

  } else {
    /* Ball going away — drift toward centre with bias factor */
    targetY = CH / 2 * profile.returnBias + p2.y * (1 - profile.returnBias);
  }

  G.cpuTarget = targetY - PH / 2;
}

/* ═══════════════════════════════════════════════════════════
   SCORING + GAME-OVER
═══════════════════════════════════════════════════════════ */
function scorePoint(winner) {
  G.ball.active = false;
  G.trail       = [];
  phase         = 'point';

  const ws = winner === 1 ? G.p1 : G.p2;
  ws.score++;

  // HUD flash
  const el = document.getElementById('hs' + winner);
  el.textContent = ws.score;
  el.classList.add('pop');
  setTimeout(() => el.classList.remove('pop'), 200);

  // Point overlay
  const big   = document.getElementById('pt-big');
  const small = document.getElementById('pt-small');
  if (winner === 1) {
    big.textContent = 'POINT!';
    big.style.cssText = 'color:#4ae8b8; text-shadow:0 0 30px rgba(74,232,184,0.9)';
  } else {
    big.textContent = 'CPU SCORES!';
    big.style.cssText = 'color:#e84a4a; text-shadow:0 0 30px rgba(232,74,74,0.9)';
  }
  small.textContent = G.p1.score + '  —  ' + G.p2.score;
  document.getElementById('ov-point').classList.add('show');

  // Win check (must reach target AND lead by ≥ 2 — classic deuce rule)
  const t  = CFG.target;
  const s1 = G.p1.score;
  const s2 = G.p2.score;
  const won = (s1 >= t && s1 - s2 >= 2) ||
              (s2 >= t && s2 - s1 >= 2) ||
              (t <= 3  && (s1 >= t || s2 >= t));

  if (won) {
    setTimeout(() => {
      document.getElementById('ov-point').classList.remove('show');
      showGameOver(winner);
    }, 1500);
  } else {
    setTimeout(() => {
      document.getElementById('ov-point').classList.remove('show');
      phase = 'playing';
      launchBall(winner === 1 ? 1 : -1);
      if (!paused) loop();
    }, 1000);
  }
}

function showGameOver(winner) {
  phase = 'over';
  const ot = document.getElementById('over-title');
  if (winner === 1) {
    ot.textContent  = 'YOU WIN!';
    ot.style.cssText = 'color:#4ae8b8; text-shadow:0 0 40px rgba(74,232,184,0.9),0 0 80px rgba(74,232,184,0.4)';
  } else {
    ot.textContent  = 'CPU WINS';
    ot.style.cssText = 'color:#e84a4a; text-shadow:0 0 40px rgba(232,74,74,0.9)';
  }
  document.getElementById('over-score').textContent = G.p1.score + '  —  ' + G.p2.score;
  document.getElementById('ov-over').classList.add('show');
}

/* ═══════════════════════════════════════════════════════════
   RALLY LABEL
═══════════════════════════════════════════════════════════ */
function updateRallyLabel() {
  const el = document.getElementById('rally-lbl');
  if (G.rally >= 5) {
    el.textContent = G.rally + ' RALLY!';
    el.style.opacity = '1';
    el.style.fontSize = Math.min(11 + G.rally * 0.6, 24) + 'px';
  } else {
    el.style.opacity = '0';
  }
}

/* ═══════════════════════════════════════════════════════════
   PARTICLES
═══════════════════════════════════════════════════════════ */
function spawnHitParticles(x, y, col) {
  for (let i = 0; i < 10; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 2 + Math.random() * 5;
    G.parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
                   life: 1, col, r: 2 + Math.random() * 3 });
  }
}

function spawnScoreParticles(x, y, col) {
  for (let i = 0; i < 30; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 2 + Math.random() * 9;
    G.parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
                   life: 1, col, r: 2 + Math.random() * 5 });
  }
}

function tickParticles() {
  for (let i = G.parts.length - 1; i >= 0; i--) {
    const p = G.parts[i];
    p.x    += p.vx;
    p.y    += p.vy;
    p.vy   += 0.13;
    p.vx   *= 0.97;
    p.life -= 0.028;
    if (p.life <= 0) G.parts.splice(i, 1);
  }
}

/* ═══════════════════════════════════════════════════════════
   DRAW
═══════════════════════════════════════════════════════════ */
function draw() {
  ctx.clearRect(0, 0, CW, CH);

  // Static BG (pre-rendered)
  ctx.drawImage(G.bg, 0, 0);

  drawNet();

  // Paddles
  drawPaddle(PM,           G.p1.y, '#4ae8b8', 'rgba(74,232,184,0.7)');
  drawPaddle(CW - PM - PW, G.p2.y, '#e84a4a', 'rgba(232,74,74,0.7)');

  // Ball trail
  G.trail.forEach((pt, i) => {
    const a = (1 - i / G.trail.length) * 0.42;
    const r = BR * (1 - i / G.trail.length * 0.65);
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.fill();
  });

  // Ball
  if (G.ball.active) drawBall();

  // Particles
  ctx.save();
  G.parts.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.col;
    ctx.fill();
  });
  ctx.restore();

  // Speed indicator (bottom strip)
  if (G.ball.active) {
    const spd  = Math.hypot(G.ball.vx, G.ball.vy);
    const pct  = Math.min(spd / 21, 1);
    const bx   = CW / 2 - 52;
    const by   = CH - 18;
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(bx, by, 104, 5);
    const sc = pct < 0.5 ? '#4ae8b8' : pct < 0.8 ? '#e8c840' : '#e84a4a';
    ctx.fillStyle = sc;
    ctx.fillRect(bx, by, 104 * pct, 5);
    ctx.fillStyle = 'rgba(200,180,140,0.25)';
    ctx.font = '9px DotGothic16, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(Math.round(spd * 15) + ' km/h', CW / 2, by - 3);
  }
}

function drawNet() {
  const nx = CW / 2 - 3;
  // Shadow behind net
  ctx.fillStyle = '#060e08';
  ctx.fillRect(nx, 0, 6, CH);
  // Mesh lines
  for (let y = 6; y < CH - 6; y += 11) {
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(nx, y, 6, 1);
  }
  // Centre stripe
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fillRect(nx + 2, 0, 2, CH);
  // Top/bottom posts
  ctx.fillStyle = '#c0a060';
  ctx.fillRect(nx - 1, 0, 8, 4);
  ctx.fillRect(nx - 1, CH - 4, 8, 4);
}

function drawPaddle(x, y, col, glowCol) {
  ctx.save();
  ctx.shadowColor = glowCol;
  ctx.shadowBlur  = 24;

  // Body
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.roundRect(x, y, PW, PH, 5);
  ctx.fill();

  // Highlight stripe
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.beginPath();
  ctx.roundRect(x + 2, y + 5, 4, PH - 10, 2);
  ctx.fill();

  // Glow border
  ctx.globalAlpha  = 0.55;
  ctx.strokeStyle  = glowCol;
  ctx.lineWidth    = 1.5;
  ctx.beginPath();
  ctx.roundRect(x, y, PW, PH, 5);
  ctx.stroke();

  ctx.restore();
}

function drawBall() {
  const { x, y } = G.ball;
  ctx.save();
  ctx.shadowColor = 'rgba(255,255,255,0.75)';
  ctx.shadowBlur  = 18;

  // Gradient sphere
  const g = ctx.createRadialGradient(x - 2, y - 2, 1, x, y, BR);
  g.addColorStop(0,   '#ffffff');
  g.addColorStop(0.6, '#f0ede8');
  g.addColorStop(1,   '#d4cfc8');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x, y, BR, 0, Math.PI * 2);
  ctx.fill();

  // Seam
  ctx.shadowBlur   = 0;
  ctx.strokeStyle  = 'rgba(0,0,0,0.1)';
  ctx.lineWidth    = 1;
  ctx.beginPath();
  ctx.arc(x, y, BR - 1, 0.4, Math.PI + 0.4);
  ctx.stroke();

  ctx.restore();
}

/* ═══════════════════════════════════════════════════════════
   GAME LOOP
═══════════════════════════════════════════════════════════ */
function loop() {
  if (phase !== 'playing' || paused) return;
  update();
  draw();
  RAF = requestAnimationFrame(loop);
}

/* ═══════════════════════════════════════════════════════════
   INITIAL RENDER (so canvas isn't blank before first game)
═══════════════════════════════════════════════════════════ */
initGame();
draw();
</script>
